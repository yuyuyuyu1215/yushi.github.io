<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玉石性格测评</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f8f5f0;padding:15px;max-width:750px;margin:0 auto}
.box{background:#fff;border-radius:16px;padding:20px;margin-bottom:18px;box-shadow:0 2px 12px #0000000c}
.que{margin-bottom:22px}
.que p{font-size:16px;margin-bottom:10px;color:#333}
.opt{display:flex;align-items:center;padding:8px 10px;margin:6px 0;border:1px #ddd solid;border-radius:8px;cursor:pointer}
.opt input{margin-right:8px}
#submit{width:100%;padding:14px;background:#9c6d49;color:#fff;border:none;border-radius:12px;font-size:17px;margin-top:10px}
.result-box{display:none}
.result-img{display:flex;flex-wrap:wrap;gap:8px;margin:15px 0}
.result-img img{width:calc(50% - 5px);border-radius:8px;object-fit:cover}
.back{padding:10px 20px;margin-top:12px;border:1px solid #9c6d49;background:#fff;color:#9c6d49;border-radius:8px}
</style>
</head>
<body>
<div class="box quiz-box">
    <h2 style="text-align:center;margin-bottom:20px">玉石性格测评</h2>
    <div class="que">
        <p>1.闲暇休息日，你的安排偏好？</p >
        <label class="opt"><input type="radio" name="q1" value="1">A.宅家看书品茶，独自静养</label>
        <label class="opt"><input type="radio" name="q1" value="2">B.约好友逛街探店、闲谈聚会</label>
        <label class="opt"><input type="radio" name="q1" value="3">C.投入手工/绘画等沉浸式爱好</label>
        <label class="opt"><input type="radio" name="q1" value="4">D.规划健身、学习提升日程</label>
    </div>
    <div class="que">
        <p>2.和人产生意见分歧时，你习惯？</p >
        <label class="opt"><input type="radio" name="q2" value="1">A.沉默回避，不想争辩</label>
        <label class="opt"><input type="radio" name="q2" value="2">B.委婉表达想法，顾及对方情绪</label>
        <label class="opt"><input type="radio" name="q2" value="3">C.换位思考，包容对方观点</label>
        <label class="opt"><input type="radio" name="q2" value="4">D.条理说理，坚持自身立场</label>
    </div>
    <div class="que">
        <p>3.挑选随身配饰，第一眼倾向？</p >
        <label class="opt"><input type="radio" name="q3" value="1">A.素面极简、无雕花细款饰品</label>
        <label class="opt"><input type="radio" name="q3" value="2">B.色彩鲜亮、花样别致的款式</label>
        <label class="opt"><input type="radio" name="q3" value="3">C.圆润弧面、温润饱满的玉佩</label>
        <label class="opt"><input type="radio" name="q3" value="4">D.棱角利落、设计冷峻的玉饰</label>
    </div>
    <div class="que">
        <p>4.突发临时变动打乱计划，你会？</p >
        <label class="opt"><input type="radio" name="q4" value="1">A.顺其自然，摆烂随缘</label>
        <label class="opt"><input type="radio" name="q4" value="2">B.快速调整，顺势换方案</label>
        <label class="opt"><input type="radio" name="q4" value="3">C.安抚心绪，慢慢重新规划</label>
        <label class="opt"><input type="radio" name="q4" value="4">D.立刻梳理，高效补救安排</label>
    </div>
    <div class="que">
        <p>5.社交模式更贴近？</p >
        <label class="opt"><input type="radio" name="q5" value="1">A.低社交，偏爱独处慢生活</label>
        <label class="opt"><input type="radio" name="q5" value="2">B.热衷团建，喜欢热闹氛围</label>
        <label class="opt"><input type="radio" name="q5" value="3">C.小众交友，重走心浅社交</label>
        <label class="opt"><input type="radio" name="q5" value="4">D.目的性社交，择优来往</label>
    </div>
    <div class="que">
        <p>6.看待新鲜事物（新潮首饰/穿搭）？</p >
        <label class="opt"><input type="radio" name="q6" value="1">A.保守观望，很少尝试</label>
        <label class="opt"><input type="radio" name="q6" value="2">B.好奇种草，愿意立马体验</label>
        <label class="opt"><input type="radio" name="q6" value="3">C.感兴趣后慢慢斟酌入手</label>
        <label class="opt"><input type="radio" name="q6" value="4">D.理性甄别，合适才接纳</label>
    </div>
    <div class="que">
        <p>7.情绪低落时的排解方式？</p >
        <label class="opt"><input type="radio" name="q7" value="1">A.独处发呆，自我消化情绪</label>
        <label class="opt"><input type="radio" name="q7" value="2">B.找人倾诉吐槽，释放烦恼</label>
        <label class="opt"><input type="radio" name="q7" value="3">C.逛玉石饰品、慢逛散心</label>
        <label class="opt"><input type="radio" name="q7" value="4">D.专注做事，用行动转移情绪</label>
    </div>
    <div class="que">
        <p>8.做事处事风格？</p >
        <label class="opt"><input type="radio" name="q8" value="1">A.随性散漫，顺其自然</label>
        <label class="opt"><input type="radio" name="q8" value="2">B.灵活变通，随机应变</label>
        <label class="opt"><input type="radio" name="q8" value="3">C.温和周全，照顾多方感受</label>
        <label class="opt"><input type="radio" name="q8" value="4">D.干脆利落，目标优先落地</label>
    </div>
    <div class="que">
        <p>9.欣赏的自然景色？</p >
        <label class="opt"><input type="radio" name="q9" value="1">A.深山孤林、清冷湖面</label>
        <label class="opt"><input type="radio" name="q9" value="2">B.繁花山野、明媚花海</label>
        <label class="opt"><input type="radio" name="q9" value="3">C.温润溪流、林间软景</label>
        <label class="opt"><input type="radio" name="q9" value="4">D.峻岭险峰、苍茫山石</label>
    </div>
    <div class="que">
        <p>10.收到礼物，你的反应？</p >
        <label class="opt"><input type="radio" name="q10" value="1">A.礼貌收下，内敛藏喜悦</label>
        <label class="opt"><input type="radio" name="q10" value="2">B.当场欣喜，直白表达开心</label>
        <label class="opt"><input type="radio" name="q10" value="3">C.细心珍藏，慢慢感念心意</label>
        <label class="opt"><input type="radio" name="q10" value="4">D.权衡回礼，处事分寸有度</label>
    </div>
    <div class="que">
        <p>11.消费选购玉石时？</p >
        <label class="opt"><input type="radio" name="q11" value="1">A.随缘偶遇，看中即入手</label>
        <label class="opt"><input type="radio" name="q11" value="2">B.被颜值配色打动，冲动选购</label>
        <label class="opt"><input type="radio" name="q11" value="3">C.看重质感温润，慢挑细选</label>
        <label class="opt"><input type="radio" name="q11" value="4">D.对比品相性价比，理智下单</label>
    </div>
    <div class="que">
        <p>12.面对未知挑战？</p >
        <label class="opt"><input type="radio" name="q12" value="1">A.心生怯意，尽量避开</label>
        <label class="opt"><input type="radio" name="q12" value="2">B.满怀期待，踊跃尝试</label>
        <label class="opt"><input type="radio" name="q12" value="3">C.稳步试探，循序渐进突破</label>
        <label class="opt"><input type="radio" name="q12" value="4">D.主动攻坚，做好预案迎战</label>
    </div>
    <button id="submit">提交测评，查看结果</button>
</div>

<div class="box result-box">
    <h3 id="res-title"></h3>
    <p id="res-desc" style="margin:10px 0;"></p >
    <p style="margin:8px 0">适配玉石款式：</p >
    <div class="result-img" id="img-box"></div>
    <button class="back" onclick="restart()">重新测试</button>
</div>

<script>
const resultData = [
    {min:12,max:20,name:"清冷通透型",desc:"内敛安静、佛系独处、心思通透、偏爱静谧独处｜匹配：冰种玉髓平安扣、晴水细镯、素面白玉坠、冰透水滴耳坠",imgs:["img/t1.jpg","img/t2.jpg","img/t3.jpg","img/t4.jpg"]},
    {min:21,max:29,name:"明媚鲜活型",desc:"外向阳光、热忱活泼、喜好新鲜、热爱热闹｜匹配：阳绿小花坠、飘花随形坠、多色玛瑙手串、糖果玛瑙耳饰",imgs:["img/m1.jpg","img/m2.jpg","img/m3.jpg","img/m4.jpg"]},
    {min:30,max:38,name:"温柔治愈型",desc:"性情温润、共情力强、包容心软、安稳随和｜匹配：藕粉圆牌、暖糖福镯、粉糖平安锁、暖黄圆珠项链",imgs:["img/w1.jpg","img/w2.jpg","img/w3.jpg"]},
    {min:39,max:48,name:"飒爽独立型",desc:"干练果决、气场出众、目标感强、思想独立｜匹配：水墨方牌、黑青玉切边镯、墨玉无事牌、切面锁骨链",imgs:["img/s1.jpg","img/s2.jpg","img/s3.jpg"]}
]

document.getElementById('submit').onclick=function(){
    let total=0;
    for(let i=1;i<=12;i++){
        let sel=document.querySelector(`input[name="q${i}"]:checked`)
        if(!sel){alert(`第${i}题还未选择！`);return}
        total+=Number(sel.value)
    }
    console.log("总分：", total); // 调试用，可删除
    let res=resultData.find(item=>total>=item.min&&total<=item.max)
    document.querySelector('.quiz-box').style.display='none'
    document.querySelector('.result-box').style.display='block'
    document.getElementById('res-title').innerText=`${res.name}（总分：${total}）`
    document.getElementById('res-desc').innerText=res.desc
    let imgHtml=''
    res.imgs.forEach(src=>{imgHtml+=`< img src="${src}" alt="玉石">`})
    document.getElementById('img-box').innerHTML=imgHtml
}
function restart(){
    document.querySelectorAll('input[type=radio]').forEach(i=>i.checked=false)
    document.querySelector('.quiz-box').style.display='block'
    document.querySelector('.result-box').style.display='none'
}
</script>
</body>
</html>
